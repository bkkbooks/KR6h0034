body:
  text: 西天譯經三藏朝奉大夫試鴻臚卿傳法大師臣施護奉詔譯爾時世尊告普勇菩薩言汝今諦聽我念過去無量無數阿僧祇劫前值遇十二俱胝如來應供正等正覺同名寶上我於爾時修勇施行即以飲食衣服殊妙莊嚴珍寶瓔珞及諸華鬘塗香等一一供養彼等諸佛時諸如來皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇十八俱胝如來應供正等正覺同名寶光我亦是時修勇施行亦以如上諸供具等一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇二十俱胝如來應供正等正覺同名頂生我亦是時修勇施行亦以如上諸供具等一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇二十俱胝如來應供正等正覺同名飲光我亦是時修勇施行亦以如上諸供具等一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇十六俱胝如來應供正等正覺同名無垢光我亦是時修勇施行為大長者甚大財富亦以如上諸供具等一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇九十五俱胝如來應供正等正覺同名能寂我亦是時修勇施行為大國王能以正法治於一切自在快樂世財無量亦以如上諸供具等一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇九十俱胝如來應供正等正覺同名作莊嚴我亦是時修勇施行為婆羅門有大寶聚於一時中盡捨所有辦如上等諸妙供具一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇十八俱胝如來應供正等正覺同名金仙人我亦是時修勇施行亦以如上諸供具等一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇十三俱胝如來應供正等正覺同名吉祥光我亦是時修勇施行亦以如上諸供具等一一供養彼等諸佛時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇二十五俱胝如來應供正等正覺同名妙華我於爾時初發信心出家修道常行精進於如是等諸如來所一一恭敬承事供養如彼阿難等無有異時諸如來亦皆與我授阿耨多羅三藐三菩提記普勇我復又念過去劫中值遇十二俱胝如來應供正等正覺同名勝觀我時於彼亦復出家是時閻浮提中所有衆生悉皆大富七寶具足快樂無礙無一衆生受不足苦彼諸佛等既出于世廣為衆生宣説大集會正法我時於彼諸如來所恭敬尊重承事供養求授阿耨多羅三藐三菩提記時諸佛等皆不與我授記我即白言諸佛世尊我於何時當得授記彼諸佛言善男子汝從是過阿僧祇劫有佛出世號曰然燈彼佛世尊當授汝記我時聞是諸佛言已修菩薩行轉復精進即時又過阿僧祇劫然燈如來出現于世我時於彼為摩拏嚩迦名為勝雲修諸梵行得見彼佛生大歡喜恭敬尊重發希有心即持優鉢羅華七莖供養彼佛作是願言願我以此善根回向阿耨多羅三藐三菩提是時燃燈如來於大衆中與我授記作如是言善男子汝於未來世過阿僧祇劫當得成佛名釋迦牟尼十號具足我於爾時得授記已於彼佛前踊身虛空高十二多羅樹却復於地一心歡喜即時證得無生法忍普勇當知我於如是無數劫中修諸梵行種諸善根供養諸佛皆為圓滿諸波羅蜜故自圓滿已復令無數百千俱胝那庾多衆生悉皆圓滿如是一切諸波羅蜜法我於今日已得成就阿耨多羅三藐三菩提普為衆生廣大宣説最上甚深微妙法門若有衆生樂見諸佛即現佛身而為説法若有衆生樂見菩薩即現菩薩身而為説法若有衆生樂見緣覺即現緣覺身而為説法若有衆生樂見聲聞即現聲聞身而為説法又復若在天趣即現天身而為説法若在人趣即現人身而為説法若在龍趣即現龍身而為説法若在夜叉趣即現夜叉身而為説法若在鬼趣即現彼身而為説法隨諸趣類一切衆生彼彼色相而為現身以善方便為宣妙法使無怖畏令深信解普勇我今何故以諸方便現種種身而為説法以諸衆生聞是法已於勝義諦得大總持觀諸世間起無常想常念修行一切善法而能究竟離諸雜染真實善根無所損減我於長夜以是方便利益安樂一切衆生普勇如我上説此大集會正法有如是功德於此會中有生疑者互相謂言正法果報為有耶為無耶阿耨多羅三藐三菩提為可得耶為不可得耶一切衆生為能度耶為不能度耶有作是言如佛所説諸法實有因能生果果必從因種善因者善法何失有作是言諸法非有果報亦無因本自空何能有果因果既無妄言歸趣普勇一切衆生差別心行明暗相違因果自異彼正説者起真實見是即名為建立正法此人福報汝今聽説二十劫中不生北俱盧洲二十五劫中皆生三十三天彼天報盡乃生百千諸佛剎中見彼諸佛聽聞正法是人不復退轉於阿耨多羅三藐三菩提彼邪説者起斷滅見是即名為破壞正法此人罪報汝今復聽從此命終生大地獄受苦一劫如是一劫而復一劫正滿八劫一一別生一大地獄於如是等八大地獄受大苦已復於九千二十八劫中尚於三惡趣展轉復生受大苦惱過是劫已雖得人身於萬六千劫中死母胎藏萬四千劫中舌根不具萬二千劫中為莽娑賓拏萬一千劫中生便無目普勇當知一切衆生無有窮盡若此界若他界若生緣若死緣若是處若非處若可意若不可意唯心造作隨業發現或有衆生修諸善法得生天趣或有衆生為菩提故修諸行願或有衆生漸得究竟無上寂滅以是因緣諸佛如來為無數百千俱胝那庾多衆生若已發趣若未發趣若天人龍神等説法化度於剎那頃無有休息爾時世尊當説法時復有八萬四千婆羅門衆九十千俱胝外道尼乾陀等衆互相議言今沙門瞿曇居王舍城鷲峯山中普會大衆知説何等我等今者可共往彼相與論義正當是時諸婆羅門外道既相議已乃與無數眷屬來詣佛所是時世尊即於會中放大希有淨妙光明普照大衆時慈氏菩薩摩訶薩即從座起偏袒右肩右膝著地合掌恭敬前白佛言世尊非無因緣而放是光今此大衆咸欲聞知願佛慈悲為我等説佛言善男子汝今當知今此會中有無量衆皆來集會慈氏菩薩復白佛言世尊為何等衆若天衆耶若人衆耶若龍神夜叉等衆耶佛言慈氏如汝所言皆來集會復有諸婆羅門外道尼乾陀等衆來入會中與我論義既調伏已我即當為如應説法彼八萬四千婆羅門九十千俱胝外道尼乾陀等衆皆發阿耨多羅三藐三菩提心慈氏復有萬八千俱胝龍王衆來入會中聞我説法已亦皆發阿耨多羅三藐三菩提心復有六萬俱胝淨光天子衆三萬二千俱胝諸天魔衆萬二千俱胝阿修羅衆如是等皆來入會聽受正法復有諸大國王所謂歡喜王妙喜王最上喜王人仙王淨軍王梵音王善現王愛軍王喜軍王妙色王勝軍王增長王如是等五百大國王各與千俱胝眷屬俱皆來入會聽受正法一一皆住堅固阿耨多羅三藐三菩提心慈氏以是因緣放此光明爾時慈氏菩薩聞佛説是大衆集會於天人非人等中有發阿耨多羅三藐三菩提心者有聞正法生信受者生大歡喜禮佛足已右繞三匝即於會中隱身不現是時諸婆羅門外道尼乾陀左囉迦波哩沒囉惹迦若天若龍乃至五百大國王等到佛所已隨自修敬各坐一面爾時東方有三萬俱胝大菩薩衆東南方亦復如是南方有五萬俱胝大菩薩衆西南方亦復如是西方有六萬俱胝大菩薩衆西北方亦復如是北方有八萬俱胝大菩薩衆東北方亦復如是上方有十萬俱胝大菩薩衆下方有九萬俱胝大菩薩衆如是等十方諸大菩薩衆一一皆已圓滿十地隨方而來入佛會中到佛所已各各頭面禮世尊足退坐一面爾時世尊告普勇菩薩言普勇汝今復往十方世界宣示諸菩薩衆作如是言如來今日當為衆生宣説大集會正法令彼十方一切菩薩合掌頂禮生隨喜心爾時普勇菩薩承佛聖旨即以頭面禮世尊足右繞三匝忽於會中隱身不現遍往十方世界隨一一方發大音聲作是唱言今娑婆世界釋迦牟尼如來當為衆生宣説大集會正法如是三復皆唱是言今娑婆世界釋迦牟尼如來當為衆生宣説大集會正法是時十方諸佛及諸菩薩皆聞是言各各稱讚善哉善哉釋迦牟尼如來能與衆生利益安樂及讚普勇菩薩能於十方世界宣揚佛事爾時普勇菩薩遍於十方世界宣示諸大菩薩已一彈指頃還復此土住立佛前禮世尊足退坐一面是時四方有四風神王來入會中盡王舍城所有境界過百由旬悉令清淨無諸塵穢帝釋天主持金剛杵來入會中諸魔外道懾然而視十方世界於虛空中布大香雲降大香雨沈水栴檀不可為喻又復雨衆天華所謂優鉢羅華俱母那華奔拏利迦華等種種妙華住於空中變成傘蓋又於佛上變作八萬四千樓閣一一皆是七寶所成衆彩雜飾殊妙莊嚴又於空中現大寶座無量無邊一一座上悉皆有佛現為衆生宣説妙法時彼三千大千世界六種震動爾時普勇菩薩摩訶薩合掌恭敬前白佛言世尊以何因緣於虛空中現斯瑞相甚為希有而彼大地忽然震動願佛慈悲當為宣説佛言普勇今此會中十方諸大菩薩及天人龍神等皆悉來集我今當為宣説正法又復為諸外道破彼邪心令歸正見以是因緣故現斯瑞普勇當知諸凡夫類雖得值遇如來應供正等正覺出現世間不能於佛殊妙色相起尊重心生難遭想設得聞佛宣説正法不能依法修行復生取相起我慢心暫得聽聞妄生多解而復起於易所得想疑惑不信作如是言如佛所説若契經若祇夜我昔不聞知何所説我今不能聽受記念我於諸法悉自了知此人以是迷惑心故恣己愚癡違背佛法作罪業因自造經書撰集義理於世間中而為正説作如是言我所造集是巧便智轉勸他人使令修習雖復以己所造經書勸人修習設使種種方便終不能令一補特伽羅而獲利樂於多生中自壞其身業因緣故臨命終時受大苦惱普勇此諸外道起迷惑心生不正見不能解脫如彼初生飛禽未生翅羽其何能飛説能飛者是為虛誑此外道輩若不回心歸佛正法其何能得究竟無上清淨涅盤彼常自計為涅盤者亦為虛誑何以故此外道輩造不正因起戒禁取破壞自身斷滅正法堅著我見無由解脫設得人身尚非勝報云何實得清淨涅盤於其自身猶未能知本何所來當何所往生滅唐捐受諸苦惱增長惡趣無有休息我觀是輩深可悲愍爾時世尊作是説已告諸外道尼乾陀等言汝等當知閻浮提中有大珍寶無能護者隨意當用我所宣説是大法聚諸有求者無所吝惜汝等若有疑惑及所希求當恣汝問如來大悲一一為汝分別開示爾時諸外道尼乾陀等各從座起合掌向佛作是問言世尊佛於長夜度諸衆生令出輪回云何衆生生滅相續無有間斷我於是事不能了知願佛宣説爾時世尊即於會中告藥王軍菩薩言今此會中諸外道輩以我大法光明威神照故漸能開解被精進鎧息疑惑心能以此義問佛世尊藥王軍一切生者略有二種一者久生二者初生譬如有人富貴自在忽於一時以水沐髮復以鮮潔上妙衣服而為嚴飾乃出其舍時有貧人見已欣樂即自還家亦沐其髮復以故衣洗濯令淨是人雖復多汲其水濯彼故衣徒使疲勞終不能令服飾新好一切生中若久生者同彼貧人濯其故服終不能淨若初生者如彼富人衣新好衣未生塵垢爾時諸婆羅門外道尼乾陀等聞佛作是説已即白佛言何者初生何者久生佛言彼六趣中相續展轉受苦衆生名為久生何以故此等衆生於六趣中不生厭離不求解脫時諸婆羅門外道等復白佛言世尊如佛所説久生衆生於輪回中受諸苦惱不能解脫初生衆生願佛顯示作是言已爾時忽有九十四千俱胝摩拏嚩迦來入會中於世尊前不伸禮敬復無所問默然而住是時藥王軍菩薩見是事已即白佛言世尊何因緣故今此輩等來入佛會而不禮敬復無所問其事云何佛言藥王軍此諸摩拏嚩迦是初生者於佛世尊未有所問是時彼諸摩拏嚩迦即作是言世尊我等是初生者佛言如是如是汝等初生如日初出光明普照遍於一切無量衆生所共瞻覩汝等久於佛道心已成熟諸菩薩法昔已通達雖名初生而久修習是時九十四千俱胝初生摩拏嚩迦即各踊身虛空從空中下一一皆得圓滿十地爾時藥王軍菩薩合掌恭敬生希有心前白佛言世尊此等衆生得大善利久已盡彼輪回苦惱具大精進是名初生今日見佛於剎那間即得解脫是時諸婆羅門外道尼乾陀等衆中有諸盲者以聞法故忽見光明各得觀佛殊妙色相見佛相已咸作是言如來應供正等正覺是最勝師我等歸依即起合掌生淨信心俱白佛言我等今者得見世尊佛言汝等應當重復審諦觀佛如來殊善色相汝等當知汝等今者諸善根力已成熟故得見世尊又得聽聞大集會法是時諸盲外道得是利已生大歡喜各各皆發阿耨多羅三藐三菩提心爾時會中諸婆羅門外道尼乾陀等聞佛説法亦皆發阿耨多羅三藐三菩提心證得無生法忍悉皆圓滿十地即時又成大菩薩衆乃各踊身虛空高七多羅樹於其空中各現種種神通變化及化種種華鬘瓔珞傘蓋幢幡七寶樓閣等住於佛上而為供養各作是念今我此身從佛智生從正法生一切如來是真歸處作是念已從空而下禮世尊足退住一面是時會中有無數百千天子見是事已即説伽陀我佛大沙門得最上善利於一切世間最尊無與等三摩地願力皆悉已具足一切勝義法無餘不知者一切衆生類無始輪回苦佛善巧方便普令得解脫婆羅門外道咸得大利樂
